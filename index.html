<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open House Photobooth 2026 | Staff</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Dashboard Layout */
        .staff-container { max-width: 1000px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 800px) { .staff-container { grid-template-columns: 1fr; } }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--dark); display: block; }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; }

        /* Queue Table */
        .queue-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .table-header { background: #f8fafc; padding: 15px 20px; font-weight: 800; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .guest-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .guest-item:hover { background: #f8fafc; }
        .guest-item.called { background: #fffbeb; border-left: 4px solid var(--warning); }
        
        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-call { background: var(--dark); color: white; width: 100%; padding: 20px; font-size: 1.2rem; margin-bottom: 20px; }
        .btn-recall { background: var(--warning); color: white; }
        .btn-done { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; color: #64748b; border: 1px solid #e2e8f0; }
        
        .notification-banner { background: var(--primary); color: white; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="notif-bar" class="notification-banner" onclick="requestNotifs()">
    🔔 Click to enable Browser Push Notifications for new guests
</div>

<div class="staff-container">
    <!-- LEFT COLUMN: LIVE OPERATIONS -->
    <div class="ops-panel">
        <button class="btn btn-call" onclick="callNext()">CALL NEXT GUEST ▶</button>
        
        <div class="stats-grid">
            <div class="card"><span class="stat-num" id="stat-waiting">0</span><span class="stat-label">Waiting</span></div>
            <div class="card"><span class="stat-num" id="stat-served">0</span><span class="stat-label">Served Total</span></div>
            <div class="card"><span class="stat-num" id="stat-speed">3.0</span><span class="stat-label">Avg Mins/Entry</span></div>
        </div>

        <div class="queue-card">
            <div class="table-header"><span>ACTIVE QUEUE</span><span id="live-count">0 People</span></div>
            <div id="queue-list"></div>
        </div>
    </div>

    <!-- RIGHT COLUMN: TOOLS & SETTINGS -->
    <div class="tools-panel">
        <div class="card">
            <h3>Manual Add</h3>
            <p style="font-size: 11px; color: #64748b;">For guests without smartphones</p>
            <input type="text" id="manual-name" placeholder="Guest Name" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
            <button class="btn btn-done" style="width:100%" onclick="manualAdd()">Add to Line</button>
        </div>

        <div class="card" style="text-align:center">
            <h3>Admin QR</h3>
            <div id="qrcode" style="display:flex; justify-content:center; padding: 10px;"></div>
            <button class="btn btn-ghost" onclick="resetSystem()" style="color:var(--danger); margin-top:20px;">RESET ALL DATA</button>
        </div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAOVUPxOa3SNuM-JP0q1oLdlLRew-o5aqU",
  authDomain: "open-house-6336b.firebaseapp.com",
  databaseURL: "https://open-house-6336b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "open-house-6336b",
  storageBucket: "open-house-6336b.firebasestorage.app",
  messagingSenderId: "246123974423",
  appId: "1:246123974423:web:b1fa9bd575e3b6ac903152"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentQueue = [];
let lastCount = 0;

// --- NOTIFICATIONS ---
function requestNotifs() {
    Notification.requestPermission().then(perm => {
        if(perm === 'granted') document.getElementById('notif-bar').style.display = 'none';
    });
}

// --- CORE SYNC ---
db.ref('/').on('value', snap => {
    const data = snap.val() || {};
    const queueData = data.queue ? Object.values(data.queue) : [];
    currentQueue = queueData.sort((a,b) => a.number - b.number);
    
    // Push Notification Logic
    if(currentQueue.length > lastCount) {
        if(Notification.permission === 'granted') {
            new Notification("New Guest!", { body: currentQueue[currentQueue.length-1].name + " joined the line." });
        }
    }
    lastCount = currentQueue.length;

    // Statistics Calculation
    const waiting = currentQueue.filter(q => q.status === 'waiting');
    const served = data.history ? Object.values(data.history).length : 0;
    
    document.getElementById('stat-waiting').innerText = waiting.length;
    document.getElementById('stat-served').innerText = served;
    document.getElementById('live-count').innerText = currentQueue.length + " Total";
    
    renderQueue();
});

function renderQueue() {
    const list = document.getElementById('queue-list');
    list.innerHTML = currentQueue.map(guest => `
        <div class="guest-item ${guest.status === 'ready' ? 'called' : ''}">
            <div>
                <span style="font-weight:900; color:var(--primary)">#${guest.number}</span>
                <span style="margin-left:10px; font-weight:700;">${guest.name}</span>
                <div style="font-size:10px; color:#94a3b8">${guest.status.toUpperCase()}</div>
            </div>
            <div style="display:flex; gap:8px;">
                ${guest.status === 'ready' ? 
                    `<button class="btn btn-recall" onclick="recall('${guest.id}')">RECALL</button>
                     <button class="btn btn-done" onclick="complete('${guest.id}')">DONE</button>` :
                    `<button class="btn btn-ghost" onclick="removeGuest('${guest.id}')">DEL</button>`
                }
            </div>
        </div>
    `).join('') || '<div style="padding:40px; text-align:center; color:#94a3b8;">Queue is empty</div>';
}

// --- ACTIONS ---
function callNext() {
    const next = currentQueue.find(q => q.status === 'waiting');
    if(next) db.ref('queue/' + next.id).update({ status: 'ready', calledAt: Date.now() });
}

function recall(id) {
    // Simply updates the timestamp to trigger a refresh on the display/guest phone
    db.ref('queue/' + id).update({ lastCalled: Date.now() });
    alert("Guest recalled on display board.");
}

function complete(id) {
    const g = currentQueue.find(x => x.id === id);
    if(g && g.calledAt) db.ref('history').push(Date.now() - g.calledAt);
    db.ref('queue/' + id).remove();
}

function removeGuest(id) { if(confirm("Remove guest?")) db.ref('queue/' + id).remove(); }

function manualAdd() {
    const name = document.getElementById('manual-name').value;
    if(!name) return;
    db.ref('nextNum').transaction(curr => (curr || 1) + 1, (err, comm, snap) => {
        if(comm) {
            const num = snap.val() - 1;
            const id = "MANUAL-" + Math.random().toString(36).substr(2, 4);
            db.ref('queue/' + id).set({ id, name, number: num, status: 'waiting', ts: Date.now() });
            document.getElementById('manual-name').value = "";
        }
    });
}

function resetSystem() {
    if(confirm("DANGER: WIPE EVERYTHING?")) {
        db.ref('queue').remove();
        db.ref('history').remove();
        db.ref('nextNum').set(1);
    }
}

new QRCode(document.getElementById("qrcode"), { text: window.location.href.replace('staff',''), width: 128, height: 128 });
</script>
</body>
</html>

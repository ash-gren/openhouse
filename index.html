<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open House Photobooth 2026</title>
    
    <!-- External Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: #1e293b; transition: background 0.3s; overflow-x: hidden; }
        
        /* Navigation */
        nav { background: var(--dark); padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: white; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-group { display: flex; gap: 6px; }
        .btn-nav { padding: 6px 12px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 11px; font-weight: 700; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Screen Management */
        .screen { display: none; padding: 1.2rem; width: 100%; max-width: 600px; margin: 0 auto; min-height: 90vh; }
        .screen.active { display: flex; flex-direction: column; }
        .card { background: white; border-radius: 1.2rem; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }

        /* Guest View */
        .big-num { font-size: 7rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 10px 0; }
        input { width: 100%; padding: 1.2rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1.1rem; margin-bottom: 1rem; outline: none; }
        .btn-main { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        /* Staff View */
        .staff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
        .stat-box { background: white; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 900; display: block; }
        .stat-lbl { font-size: 9px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .guest-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .guest-row.ready { background: #f0fdf4; border-left: 4px solid var(--accent); }

        /* Display Board Specific */
        #board-screen { max-width: 100vw; padding: 0; background: #000; color: white; }
        .missed-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<nav>
    <div class="logo">OPEN HOUSE 2026</div>
    <div class="nav-group">
        <button class="btn-nav active" id="nav-guest" onclick="showScreen('guest')">Join</button>
        <button class="btn-nav" id="nav-staff" onclick="tryAdmin('staff')">Staff</button>
        <button class="btn-nav" id="nav-board" onclick="tryAdmin('board')">Display</button>
    </div>
</nav>

<!-- GUEST SCREEN -->
<div id="guest-screen" class="screen active">
    <div style="text-align:center; padding: 2rem 0;">
        <h1 style="font-size: 2.2rem; font-weight: 900;">Photobooth</h1>
        <p id="ai-wait-info" style="color:var(--primary); font-weight:700;">Connecting...</p>
    </div>
    
    <div id="reg-view" class="card">
        <input type="text" id="guest-name" placeholder="Your Name" maxlength="15">
        <button class="btn-main" id="join-btn" onclick="joinQueue()">Get My Number</button>
    </div>
    
    <div id="status-view" class="card" style="display:none; text-align:center;">
        <span class="stat-lbl">Your Number</span>
        <h1 class="big-num" id="my-number">--</h1>
        <div id="my-instruction" style="padding:15px; font-weight:800; border-radius:12px; background:#f1f5f9; font-size: 1.1rem;">Waiting...</div>
        <button onclick="leaveQueue()" style="margin-top:2rem; background:none; border:none; color:#94a3b8; font-weight:700; cursor:pointer;">Cancel Spot</button>
    </div>
</div>

<!-- STAFF SCREEN -->
<div id="staff-screen" class="screen">
    <div class="staff-grid">
        <div class="stat-box"><span class="stat-lbl">Waiting</span><span id="stat-wait" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Served</span><span id="stat-done" class="stat-val">0</span></div>
    </div>
    
    <button class="btn-main" style="background:var(--dark); margin-bottom:1rem;" onclick="callNext()">CALL NEXT GUEST ▶</button>
    
    <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding:12px; background:#f8fafc; font-weight:800; font-size:12px; border-bottom:1px solid #e2e8f0;">LIVE QUEUE</div>
        <div id="staff-list" style="max-height:40vh; overflow-y:auto;"></div>
    </div>

    <div class="card" style="margin-top:1rem;">
        <h4 style="font-size:12px; margin-bottom:10px;">Manual Add (No Phone)</h4>
        <div style="display:flex; gap:10px;">
            <input type="text" id="manual-name" placeholder="Name" style="margin:0; padding:0.8rem;">
            <button onclick="manualAdd()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:10px; font-weight:700;">ADD</button>
        </div>
    </div>

    <div style="margin-top:auto; padding: 2rem 0; text-align:center;">
        <div id="qrcode" style="display:inline-block; background:white; padding:10px; border-radius:10px;"></div>
        <button onclick="resetSystem()" style="display:block; margin: 10px auto; color:var(--danger); background:none; border:none; font-size:11px; font-weight:700; cursor:pointer;">FULL SYSTEM RESET</button>
    </div>
</div>

<!-- DISPLAY BOARD -->
<div id="board-screen" class="screen">
    <div style="display: flex; height: 90vh; gap: 20px; padding: 20px;">
        <!-- MAIN AREA -->
        <div style="flex: 2.5; background: #111; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #334155;">
            <h2 style="color: #64748b; font-size: 2rem; margin-bottom: 1rem; letter-spacing: 2px;">NOW SERVING</h2>
            <div id="board-grid" style="text-align: center; width: 100%;"></div>
        </div>
        
        <!-- SIDEBAR -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
            <div style="background: #1e293b; border-radius: 2rem; padding: 2rem; flex: 1; border-left: 8px solid var(--danger);">
                <h3 style="color: #ef4444; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">MISSED CALLS</h3>
                <div id="missed-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="screen">
    <div class="card" style="margin-top:4rem; text-align:center;">
        <h2 style="margin-bottom:1rem;">Staff Access</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn-main" onclick="verifyPass()">Unlock</button>
    </div>
</div>

<script>
// --- CONFIG ---
const HIDDEN_KEY = "b3BlbmhvdXNlMjAyNg=="; 
const firebaseConfig = {
  apiKey: "AIzaSyAOVUPxOa3SNuM-JP0q1oLdlLRew-o5aqU",
  authDomain: "open-house-6336b.firebaseapp.com",
  databaseURL: "https://open-house-6336b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "open-house-6336b",
  storageBucket: "open-house-6336b.firebasestorage.app",
  messagingSenderId: "246123974423",
  appId: "1:246123974423:web:b1fa9bd575e3b6ac903152"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let queue = [];
let isAdmin = false;

// --- DATABASE SYNC ---
db.ref('/').on('value', snap => {
    const data = snap.val() || {};
    queue = data.queue ? Object.values(data.queue).sort((a,b) => a.number - b.number) : [];
    updateUI(data.history ? Object.keys(data.history).length : 0);
});

function joinQueue() {
    const name = document.getElementById('guest-name').value.trim();
    if(name.length < 2) return;
    db.ref('nextNum').transaction(c => (c || 1) + 1, (err, comm, snap) => {
        if(comm) {
            const num = snap.val() - 1;
            const id = "G" + Math.random().toString(36).substr(2, 5).toUpperCase();
            db.ref('queue/' + id).set({ id, name, number: num, status: 'waiting', ts: Date.now() })
                .then(() => localStorage.setItem('pb_user_id', id));
        }
    });
}

function updateUI(servedCount) {
    const myId = localStorage.getItem('pb_user_id');
    const me = queue.find(q => q.id === myId);
    const waiting = queue.filter(q => q.status === 'waiting');
    const ready = queue.filter(q => q.status === 'ready');
    const missed = queue.filter(q => q.status === 'missed');

    // Guest Status Logic
    document.getElementById('ai-wait-info').innerText = `Current Wait: ${waiting.length} guests`;
    if(me) {
        document.getElementById('reg-view').style.display = 'none';
        document.getElementById('status-view').style.display = 'block';
        document.getElementById('my-number').innerText = me.number;
        
        const inst = document.getElementById('my-instruction');
        if(me.status === 'ready') {
            inst.innerText = "IT'S YOUR TURN!";
            inst.style.background = "var(--accent)";
            inst.style.color = "white";
            if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
            if(!window.didConfetti) { confetti(); window.didConfetti = true; }
        } else if (me.status === 'missed') {
            inst.innerText = "MISSED CALL - PLEASE SEE STAFF";
            inst.style.background = "var(--danger)";
            inst.style.color = "white";
        } else {
            inst.innerText = `Position in Line: #${waiting.findIndex(x => x.id === myId) + 1}`;
            inst.style.background = "#f1f5f9";
            inst.style.color = "#1e293b";
        }
    }

    // Staff Panel Logic
    if(isAdmin) {
        document.getElementById('stat-wait').innerText = waiting.length;
        document.getElementById('stat-done').innerText = servedCount;
        
        document.getElementById('staff-list').innerHTML = queue.map(q => `
            <div class="guest-row ${q.status === 'ready' ? 'ready' : ''}">
                <div style="font-size:13px;"><b>#${q.number}</b> ${q.name}</div>
                <div style="display:flex; gap:5px;">
                    ${q.status === 'ready' ? 
                        `<button onclick="noShow('${q.id}')" style="border:none; background:var(--danger); color:white; padding:4px 8px; border-radius:4px; font-size:10px;">NO SHOW</button>
                         <button onclick="finish('${q.id}')" style="border:none; background:var(--accent); color:white; padding:4px 8px; border-radius:4px; font-size:10px;">DONE</button>` : 
                        `<button onclick="recall('${q.id}')" style="border:none; background:var(--primary); color:white; padding:4px 8px; border-radius:4px; font-size:10px;">${q.status==='missed'?'RE-CALL':'CALL'}</button>`}
                </div>
            </div>
        `).join('');
    }

    // Display Board Logic
    document.getElementById('board-grid').innerHTML = ready.map(q => `
        <div>
            <h1 style="font-size: 15rem; font-weight: 900; line-height: 1; color: var(--accent); margin: 0;">${q.number}</h1>
            <p style="font-size: 4rem; font-weight: 800; color: white;">${q.name}</p>
        </div>
    `).join('') || '<div style="color:#334155; font-size:2rem;">Waiting...</div>';

    document.getElementById('missed-list').innerHTML = missed.map(q => `
        <div class="missed-item">
            <span style="font-size: 2.5rem; font-weight: 900; color: #ef4444;">#${q.number}</span>
            <span style="font-size: 1.2rem; font-weight: 600;">${q.name}</span>
        </div>
    `).join('') || '<div style="color:#475569; font-size:0.9rem;">None</div>';
}

// --- OPERATIONS ---
function callNext() {
    const next = queue.find(q => q.status === 'waiting');
    if(next) db.ref('queue/' + next.id).update({ status: 'ready', calledAt: Date.now() });
}
function noShow(id) { db.ref('queue/' + id).update({ status: 'missed' }); }
function recall(id) { 
    window.didConfetti = false; 
    db.ref('queue/' + id).update({ status: 'ready', calledAt: Date.now() }); 
}
function finish(id) {
    db.ref('history').push(Date.now());
    db.ref('queue/' + id).remove();
}
function manualAdd() {
    const name = document.getElementById('manual-name').value;
    if(!name) return;
    db.ref('nextNum').transaction(c => (c || 1) + 1, (err, comm, snap) => {
        if(comm) {
            const num = snap.val() - 1;
            db.ref('queue/M'+Date.now()).set({ id: 'M'+Date.now(), name, number: num, status: 'waiting', ts: Date.now() });
            document.getElementById('manual-name').value = "";
        }
    });
}
function leaveQueue() {
    const id = localStorage.getItem('pb_user_id');
    if(id) db.ref('queue/' + id).remove();
    localStorage.clear(); location.reload();
}
function resetSystem() {
    if(confirm("FULL RESET?")) {
        db.ref('/').set({ nextNum: 1 }).then(() => location.reload());
    }
}

// --- NAV & AUTH ---
let pendingScreen = '';
function tryAdmin(s) { pendingScreen = s; isAdmin ? showScreen(s) : showScreen('auth'); }
function verifyPass() {
    if(btoa(document.getElementById('pass-input').value) === HIDDEN_KEY) {
        isAdmin = true; showScreen(pendingScreen);
    } else alert("Wrong Pass");
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    const bMap = {'guest':'nav-guest', 'staff':'nav-staff', 'board':'nav-board'};
    if(bMap[id]) document.getElementById(bMap[id]).classList.add('active');
    if(id === 'staff') {
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: window.location.href, width: 90, height: 90 });
    }
}
</script>
</body>
</html>

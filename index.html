<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open House Photobooth 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --danger: #ef4444; --dark: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: #1e293b; }
        
        nav { background: var(--dark); padding: 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; color: white; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-group { display: flex; gap: 6px; }
        .btn-nav { padding: 6px 12px; border-radius: 6px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 11px; font-weight: 700; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }

        .screen { display: none; padding: 1rem; max-width: 600px; margin: 0 auto; min-height: 90vh; }
        .screen.active { display: flex; flex-direction: column; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        
        /* Staff UI */
        .staff-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .stat-box { background: white; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--dark); display: block; }
        .stat-lbl { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        
        .btn-call { width: 100%; padding: 1.5rem; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.2rem; cursor: pointer; margin-bottom: 1rem; }
        .queue-list { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; background: white; }
        .guest-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        .guest-row.ready { background: #f0fdf4; border-left: 4px solid var(--accent); }

        /* Join UI */
        input { width: 100%; padding: 1.2rem; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 1.1rem; margin: 1rem 0; outline: none; }
        .btn-join { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }
        
        /* Board UI */
        #board-screen { background: #000; max-width: 100%; padding: 0; }
        .board-tile { background: #111; color: white; padding: 3rem; border-radius: 2rem; text-align: center; border-bottom: 12px solid var(--accent); margin: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">OPEN HOUSE 2026</div>
    <div class="nav-group">
        <button class="btn-nav active" onclick="showScreen('guest')">Join</button>
        <button class="btn-nav" onclick="tryAdmin('staff')">Staff</button>
        <button class="btn-nav" onclick="tryAdmin('board')">Display</button>
    </div>
</nav>

<!-- GUEST SCREEN -->
<div id="guest-screen" class="screen active">
    <div style="text-align:center; padding: 2rem 0;">
        <h1 style="font-size: 2rem; font-weight: 900;">Join the Line</h1>
        <p id="ai-wait-info" style="color:var(--primary); font-weight:700;">Calculating...</p>
    </div>
    
    <div id="reg-view" class="card">
        <input type="text" id="guest-name" placeholder="Your Name" maxlength="15">
        <button class="btn-join" id="join-btn" onclick="joinQueue()">Get My Number</button>
    </div>
    
    <div id="status-view" class="card" style="display:none; text-align:center;">
        <h1 id="my-number" style="font-size: 6rem; font-weight: 900; color: var(--primary);">--</h1>
        <div id="my-instruction" style="padding:10px; font-weight:700; border-radius:8px; background:#f1f5f9;">Waiting...</div>
        <button onclick="leaveQueue()" style="margin-top:2rem; background:none; border:none; color:#94a3b8; cursor:pointer;">Cancel Spot</button>
    </div>
</div>

<!-- STAFF SCREEN -->
<div id="staff-screen" class="screen">
    <div class="staff-stats">
        <div class="stat-box"><span class="stat-lbl">Waiting</span><span id="stat-wait" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Avg Mins</span><span id="stat-avg" class="stat-val">3.0</span></div>
    </div>
    <button class="btn-call" onclick="callNext()">CALL NEXT ▶</button>
    <div class="queue-list" id="staff-list"></div>
    <div class="card" style="margin-top:1rem; text-align:center;">
        <div id="qrcode" style="display:flex; justify-content:center; margin-bottom:10px;"></div>
    </div>
    <button onclick="resetAllData()" style="margin-top:2rem; color:#cbd5e1; background:none; border:none; cursor:pointer;">RESET ALL DATA</button>
</div>

<!-- BOARD SCREEN -->
<div id="board-screen" class="screen">
    <div style="padding: 3rem; text-align: center; color: white;"><h1>NOW SERVING</h1></div>
    <div id="board-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));"></div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen">
    <div class="card" style="margin-top: 4rem; text-align:center;">
        <h2>Staff Login</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn-join" onclick="verifyPass()">Unlock</button>
    </div>
</div>

<script>
const HIDDEN_KEY = "b3BlbmhvdXNlMjAyNg==";
const firebaseConfig = {
  apiKey: "AIzaSyAOVUPxOa3SNuM-JP0q1oLdlLRew-o5aqU",
  authDomain: "open-house-6336b.firebaseapp.com",
  databaseURL: "https://open-house-6336b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "open-house-6336b",
  storageBucket: "open-house-6336b.firebasestorage.app",
  messagingSenderId: "246123974423",
  appId: "1:246123974423:web:b1fa9bd575e3b6ac903152"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let queue = [];
let avgTime = 3.0;
let isAdmin = false;

// --- AUTO-SYNC RESCUE ---
db.ref('.info/connected').on('value', snap => {
    if (snap.val() === false) console.warn("Searching for connection...");
});

db.ref('/').on('value', snap => {
    const data = snap.val() || {};
    queue = data.queue ? Object.values(data.queue).sort((a,b) => a.number - b.number) : [];
    if (data.history) {
        const hist = Object.values(data.history).slice(-10);
        avgTime = (hist.reduce((a, b) => a + b, 0) / hist.length / 60000).toFixed(1);
    }
    updateUI();
});

function joinQueue() {
    const name = document.getElementById('guest-name').value.trim();
    if (name.length < 2) return;

    const btn = document.getElementById('join-btn');
    btn.disabled = true;
    btn.innerText = "Syncing...";

    // FAIL-SAFE: If it takes more than 5s, unlock the button
    const timeout = setTimeout(() => {
        if (btn.disabled) {
            btn.disabled = false;
            btn.innerText = "Try Again (Timeout)";
        }
    }, 5000);

    db.ref('nextNum').transaction(curr => (curr || 1) + 1, (err, comm, snap) => {
        clearTimeout(timeout);
        if (comm) {
            const num = snap.val() - 1;
            const id = "G" + Math.random().toString(36).substr(2, 5).toUpperCase();
            db.ref('queue/' + id).set({ id, name, number: num, status: 'waiting', ts: Date.now() })
              .then(() => localStorage.setItem('pb_user_id', id))
              .catch(() => { btn.disabled = false; btn.innerText = "Error (Check Rules)"; });
        }
    });
}

function updateUI() {
    const myId = localStorage.getItem('pb_user_id');
    const me = queue.find(q => q.id === myId);
    const waiting = queue.filter(q => q.status === 'waiting');
    const ready = queue.filter(q => q.status === 'ready');

    if(document.getElementById('stat-wait')) {
        document.getElementById('stat-wait').innerText = waiting.length;
        document.getElementById('stat-avg').innerText = avgTime;
    }

    document.getElementById('ai-wait-info').innerText = `Est. Wait: ~${Math.round(waiting.length * avgTime)} mins`;

    if (me) {
        document.getElementById('reg-view').style.display = 'none';
        document.getElementById('status-view').style.display = 'block';
        document.getElementById('my-number').innerText = me.number;
        document.getElementById('my-instruction').innerText = me.status === 'ready' ? "GO NOW!" : `Position: #${waiting.findIndex(x => x.id === myId) + 1}`;
        if(me.status === 'ready' && !window.didConfetti) { confetti(); window.didConfetti = true; }
    }

    document.getElementById('staff-list').innerHTML = queue.map(q => `
        <div class="guest-row ${q.status === 'ready' ? 'ready' : ''}">
            <div><b>#${q.number}</b> ${q.name}</div>
            <button onclick="${q.status === 'ready' ? `finish('${q.id}')` : `removeGuest('${q.id}')`}" 
                    style="border:none; padding:5px 10px; border-radius:4px; font-weight:700;">
                ${q.status === 'ready' ? 'DONE' : 'DEL'}
            </button>
        </div>
    `).join('') || '<p style="padding:1rem; text-align:center;">Empty</p>';

    document.getElementById('board-grid').innerHTML = ready.map(q => `
        <div class="board-tile"><h1>${q.number}</h1><p>${q.name}</p></div>
    `).join('');
}

function callNext() {
    const next = queue.find(q => q.status === 'waiting');
    if (next) db.ref('queue/' + next.id).update({ status: 'ready', calledAt: Date.now() });
}

function finish(id) {
    const g = queue.find(x => x.id === id);
    if (g && g.calledAt) db.ref('history').push(Date.now() - g.calledAt);
    db.ref('queue/' + id).remove();
}

function removeGuest(id) { db.ref('queue/' + id).remove(); }
function leaveQueue() { 
    const id = localStorage.getItem('pb_user_id');
    if(id) removeGuest(id);
    localStorage.clear();
    location.reload();
}
function tryAdmin(s) { pending = s; isAdmin ? showScreen(s) : showScreen('auth'); }
function verifyPass() {
    if (btoa(document.getElementById('pass-input').value) === HIDDEN_KEY) {
        isAdmin = true; showScreen(pending);
    } else { alert("Wrong Password"); }
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    if(id === 'staff') {
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: window.location.href, width: 80, height: 80 });
    }
}
function resetAllData() {
    if(confirm("Wipe everything?")) {
        // This now works because the rules allow setting nextNum back to 1
        db.ref('/').set({ nextNum: 1 }); 
        localStorage.clear();
        location.reload();
    }
}
</script>
</body>
</html>

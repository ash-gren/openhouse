<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open House Photobooth 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #2563eb; --accent: #10b981; --warning: #f59e0b; 
            --danger: #ef4444; --dark: #0f172a; --bg: #f8fafc; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--dark); }

        nav { background: var(--dark); padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: white; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .nav-group { display: flex; gap: 8px; }
        .btn-nav { padding: 6px 12px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 11px; font-weight: 700; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }

        .screen { display: none; padding: 1.2rem; width: 100%; max-width: 500px; margin: 0 auto; min-height: 90vh; }
        .screen.active { display: flex; flex-direction: column; }
        .card { background: white; border-radius: 1.2rem; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1rem; }

        /* Stats Dashboard */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
        .stat-card { background: white; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--primary); display: block; }

        /* Progress Bar */
        .journey-wrap { position: relative; padding: 20px 0 40px 0; margin: 10px 0; }
        .track { height: 10px; background: #e2e8f0; border-radius: 10px; position: relative; }
        .fill { 
            height: 100%; background: var(--accent); border-radius: 10px; width: 0%; 
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .node { 
            position: absolute; top: -4px; width: 18px; height: 18px; 
            background: white; border: 4px solid #cbd5e1; border-radius: 50%; z-index: 5; 
        }
        .node.on { border-color: var(--accent); background: var(--accent); }
        .node-lbl { position: absolute; top: 24px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 800; color: #94a3b8; white-space: nowrap; }
        .node.on .node-lbl { color: var(--dark); }

        .big-num { font-size: 6rem; font-weight: 900; color: var(--primary); text-align: center; line-height: 1; margin: 10px 0; }
        input { width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; margin-bottom: 1rem; outline: none; }
        .btn-big { width: 100%; padding: 1.1rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">OH2026 PHOTO</div>
        <div class="nav-group">
            <button class="btn-nav active" id="nav-guest" onclick="showScreen('guest')">Queue</button>
            <button class="btn-nav" id="nav-staff" onclick="tryAdmin('staff')">Admin</button>
        </div>
    </nav>

    <!-- GUEST SCREEN -->
    <div id="guest-screen" class="screen active">
        <div id="reg-form" class="card">
            <h2 style="margin-bottom:10px;">Join Queue</h2>
            <input type="text" id="user-name" placeholder="Enter Name" maxlength="15">
            <button class="btn-big" onclick="doJoin()">Get My Number</button>
        </div>

        <div id="status-card" class="card" style="display:none; text-align:center;">
            <span class="stat-label">Your Entry Number</span>
            <div class="big-num" id="my-no">--</div>
            
            <div class="journey-wrap">
                <div class="track">
                    <div id="bar" class="fill"></div>
                    <div class="node on" style="left:0%"><span class="node-lbl">Joined</span></div>
                    <div class="node" id="n1" style="left:33%"><span class="node-lbl">Process</span></div>
                    <div class="node" id="n2" style="left:66%"><span class="node-lbl">Print</span></div>
                    <div class="node" id="n3" style="left:100%"><span class="node-lbl">Ready</span></div>
                </div>
            </div>

            <div id="info-box" style="background:#f1f5f9; padding:15px; border-radius:12px; font-weight:800;">
                Calculating wait time...
            </div>
            <button onclick="doLeave()" style="background:none; border:none; color:var(--danger); font-size:11px; margin-top:20px; font-weight:700; cursor:pointer;">Cancel My Spot</button>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div id="staff-screen" class="screen">
        <div class="stats-row">
            <div class="stat-card"><span class="stat-label">Waiting</span><span class="stat-val" id="s-wait">0</span></div>
            <div class="stat-card"><span class="stat-label">Served</span><span class="stat-val" id="s-done">0</span></div>
            <div class="stat-card"><span class="stat-label">Avg/Min</span><span class="stat-val" id="s-avg">2</span></div>
        </div>
        <div class="card">
            <button class="btn-big" style="background:var(--dark); margin-bottom:1rem;" onclick="doNext()">CALL NEXT GUEST ▶</button>
            <div id="staff-list"></div>
        </div>
        <button onclick="doReset()" style="color:var(--danger); background:none; border:none; font-size:11px; font-weight:800; padding:20px; width:100%; cursor:pointer;">⚠️ SYSTEM RESET</button>
    </div>

    <!-- AUTH -->
    <div id="auth-screen" class="screen">
        <div class="card">
            <input type="password" id="pw" placeholder="Admin Password">
            <button class="btn-big" onclick="doAuth()">Login</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOVUPxOa3SNuM-JP0q1oLdlLRew-o5aqU",
            authDomain: "open-house-6336b.firebaseapp.com",
            databaseURL: "https://open-house-6336b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "open-house-6336b",
            storageBucket: "open-house-6336b.firebasestorage.app",
            messagingSenderId: "246123974423",
            appId: "1:246123974423:web:b1fa9bd575e3b6ac903152"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let queue = [], stats = { served: 0, avgWaitSec: 120 }, isAdmin = false;

        // --- DATA HANDLER ---
        db.ref('/').on('value', snap => {
            const data = snap.val() || {};
            // Self-heal: If stats missing, create them
            if(!data.stats) db.ref('stats').set({ served: 0, avgWaitSec: 120 });
            if(!data.nextNum) db.ref('nextNum').set(1);

            queue = data.queue ? Object.values(data.queue).sort((a,b) => a.ts - b.ts) : [];
            stats = data.stats || { served: 0, avgWaitSec: 120 };
            updateUI();
        });

        function updateUI() {
            const myId = localStorage.getItem('pb_user_id');
            const me = queue.find(q => q.id === myId);
            const waiting = queue.filter(q => q.status === 'waiting');

            if (me) {
                document.getElementById('reg-form').style.display = 'none';
                document.getElementById('status-card').style.display = 'block';
                document.getElementById('my-no').innerText = me.number;

                const bar = document.getElementById('bar');
                const info = document.getElementById('info-box');

                if (me.status === 'ready') {
                    bar.style.width = "100%";
                    [1,2,3].forEach(n => document.getElementById('n'+n).classList.add('on'));
                    info.innerHTML = "🎉 READY! Please collect your photo.";
                    info.style.background = "var(--accent)"; info.style.color = "white";
                } else {
                    const pos = waiting.findIndex(x => x.id === myId);
                    const waitMins = Math.max(1, Math.ceil(((pos + 1) * stats.avgWaitSec) / 60));
                    bar.style.width = pos === 0 ? "33%" : "10%";
                    info.innerHTML = `Wait Time: ~${waitMins} min${waitMins > 1 ? 's' : ''}<br><span style="font-size:12px; opacity:0.7">Position: ${pos+1}</span>`;
                }
            }

            if (isAdmin) {
                document.getElementById('s-wait').innerText = waiting.length;
                document.getElementById('s-done').innerText = stats.served;
                document.getElementById('s-avg').innerText = Math.round(stats.avgWaitSec / 60);
                document.getElementById('staff-list').innerHTML = queue.map(q => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                        <span><b>#${q.number}</b> ${q.name}</span>
                        <button onclick="setDone('${q.id}')" style="background:var(--accent); color:white; border:none; padding:4px 8px; border-radius:5px;">Done</button>
                    </div>
                `).join('');
            }
        }

        // --- LOGIC ---
        function doJoin() {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            db.ref('nextNum').transaction(n => (n || 1) + 1, (err, comm, snap) => {
                const id = 'ID' + Date.now();
                db.ref('queue/' + id).set({ id, name, number: snap.val()-1, status: 'waiting', ts: Date.now() });
                localStorage.setItem('pb_user_id', id);
            });
        }

        function doNext() {
            const next = queue.find(q => q.status === 'waiting');
            if(next) {
                const actualWait = (Date.now() - next.ts) / 1000;
                const newAvg = (stats.avgWaitSec * 0.7) + (actualWait * 0.3);
                db.ref('stats/avgWaitSec').set(Math.max(45, newAvg));
                db.ref('queue/' + next.id).update({ status: 'ready' });
            }
        }

        function setDone(id) {
            db.ref('stats/served').transaction(s => (s || 0) + 1);
            db.ref('queue/' + id).remove();
        }

        function doLeave() {
            const id = localStorage.getItem('pb_user_id');
            if(id) db.ref('queue/' + id).remove();
            localStorage.clear();
            location.reload();
        }

        function doReset() {
            if(confirm("Full wipe?")) db.ref('/').set({ nextNum: 1, stats: { served: 0, avgWaitSec: 120 }, queue: {} });
        }

        function doAuth() {
            if(document.getElementById('pw').value === 'openhouse2026') {
                isAdmin = true; showScreen('staff');
            } else alert('No.');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-screen').classList.add('active');
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
        }

        function tryAdmin(s) { isAdmin ? showScreen(s) : showScreen('auth'); }
    </script>
</body>
</html>

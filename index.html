<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open House Photobooth 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --missed: #f43f5e; --dark: #0f172a; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #1e293b; overflow-x: hidden; }
        
        nav { background: var(--dark); padding: 0.8rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: white; font-size: 0.7rem; text-transform: uppercase; }
        .btn-nav { padding: 6px 10px; border-radius: 8px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 10px; font-weight: 700; }
        .btn-nav.active { background: var(--primary); color: white; border-color: var(--primary); }

        .screen { display: none; padding: 1rem; width: 100%; max-width: 800px; margin: 0 auto; min-height: 90vh; }
        .screen.active { display: flex; flex-direction: column; }
        .card { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 1rem; border: 1px solid #e2e8f0; }

        /* JOURNEY BAR */
        .journey-container { position: relative; padding: 40px 10px; margin: 15px 0; }
        .journey-track { height: 8px; background: #e2e8f0; border-radius: 10px; position: relative; width: 100%; }
        .journey-fill { height: 100%; background: var(--accent); border-radius: 10px; width: 0%; transition: width 0.6s ease; position: absolute; z-index: 2; }
        .node { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; background: white; border: 5px solid #cbd5e1; border-radius: 50%; z-index: 5; transition: 0.3s; }
        .node.active { border-color: var(--accent); background: var(--accent); }
        .node-label { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }

        /* DISPLAY PAGE ADAPTIVE */
        .display-main { background: #000; color: white; min-height: 100vh; padding: 2rem; text-align: center; }
        .ready-title { color: var(--accent); font-size: 4vw; font-weight: 900; margin-bottom: 1rem; }
        .ready-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 95vw; margin: 0 auto; }
        .ready-num { font-size: 15vw; font-weight: 900; line-height: 1; color: white; }
        .missed-section { margin-top: 4rem; border-top: 2px solid #334155; padding-top: 2rem; }
        .missed-title { color: var(--missed); font-size: 2.5vw; font-weight: 800; margin-bottom: 1rem; }
        .missed-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; font-size: 5vw; color: #64748b; }

        .big-num { font-size: 8rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        input { width: 100%; padding: 1rem; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 1.1rem; margin-bottom: 1rem; }
        .btn-main { width: 100%; padding: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
        .stat-box { background: white; padding: 12px 5px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: 900; color: var(--primary); }
        .stat-lab { font-size: 7px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>

<nav>
    <div class="logo">PHOTOBOOTH 2026</div>
    <div class="nav-group">
        <button class="btn-nav active" id="nav-guest" onclick="showScreen('guest')">Join</button>
        <button class="btn-nav" id="nav-staff" onclick="tryAdmin('staff')">Staff</button>
        <button class="btn-nav" id="nav-board" onclick="tryAdmin('board')">Display</button>
    </div>
</nav>

<div id="guest-screen" class="screen active">
    <div id="reg-view" class="card">
        <h2 style="text-align:center; margin-bottom:1.5rem;">Register</h2>
        <input type="text" id="guest-name" placeholder="Name" maxlength="12">
        <button class="btn-main" onclick="joinQueue()">Join Queue</button>
    </div>
    <div id="status-view" class="card" style="display:none; text-align:center;">
        <h1 class="big-num" id="my-number">--</h1>
        <div class="journey-container">
            <div class="journey-track">
                <div id="journey-fill" class="journey-fill"></div>
                <div class="node active" style="left: 0%"><span class="node-label">Queued</span></div>
                <div class="node" id="node-1" style="left: 33%"><span class="node-label">Process</span></div>
                <div class="node" id="node-2" style="left: 66%"><span class="node-label">Print</span></div>
                <div class="node" id="node-3" style="left: 100%"><span class="node-label">Ready</span></div>
            </div>
        </div>
        <div id="my-instruction" style="padding:1rem; font-weight:800; border-radius:10px; background:#f1f5f9; margin-top:1rem;">Waiting...</div>
        <button id="alert-sync" onclick="syncAlerts()" style="background:#e2e8f0; border:none; padding:8px 15px; border-radius:20px; font-size:10px; font-weight:700; margin: 15px 0; cursor:pointer;">🔔 SYNC NOTIFICATIONS</button>
        <button id="stop-alert" onclick="stopAlert()" style="display:none; width:100%; padding:1rem; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:900; margin-top:10px; cursor:pointer;">DISMISS ALERT</button>
        <button onclick="leaveQueue()" style="background:none; border:none; color:#94a3b8; font-size:11px; margin-top:1.5rem; cursor:pointer;">Cancel Spot</button>
    </div>
</div>

<div id="staff-screen" class="screen">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-val" id="stat-waiting">0</span><span class="stat-lab">Wait</span></div>
        <div class="stat-box"><span class="stat-val" id="stat-ready">0</span><span class="stat-lab">Ready</span></div>
        <div class="stat-box" style="border-color:var(--accent)"><span class="stat-val" id="stat-done">0</span><span class="stat-lab">Done</span></div>
        <div class="stat-box"><span class="stat-val" id="stat-time">0m</span><span class="stat-lab">Avg</span></div>
    </div>
    <div class="card">
        <button class="btn-main" style="background:var(--dark); margin-bottom:1rem;" onclick="callNext()">CALL NEXT ▶</button>
        <div style="display:flex; gap:8px;">
            <input type="text" id="manual-name" placeholder="Manual Name" style="margin:0;">
            <button onclick="manualAdd()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:10px; font-weight:800; cursor:pointer;">ADD</button>
        </div>
    </div>
    <div class="card" style="padding:0; overflow:hidden;"><div id="staff-list"></div></div>
    <button onclick="resetSystem()" style="color:var(--missed); background:none; border:none; font-size:10px; font-weight:800; padding:2rem; width:100%; cursor:pointer;">⚠️ NUCLEAR RESET (ERASE ALL DATA)</button>
</div>

<div id="board-screen" class="display-main screen" style="max-width:100vw;">
    <h2 class="ready-title">PHOTO READY</h2>
    <div id="board-grid" class="ready-grid"></div>
    <div class="missed-section">
        <h3 class="missed-title">PREVIOUS / MISSED</h3>
        <div id="missed-grid" class="missed-grid"></div>
    </div>
</div>

<div id="auth-screen" class="screen">
    <div class="card"><input type="password" id="pass-input" placeholder="Admin Pass"><button class="btn-main" onclick="verifyPass()">Login</button></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAOVUPxOa3SNuM-JP0q1oLdlLRew-o5aqU",
    authDomain: "open-house-6336b.firebaseapp.com",
    databaseURL: "https://open-house-6336b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "open-house-6336b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let queue = [], isAdmin = false, totalDone = 0, alertsEnabled = false, alertLoop = null;

db.ref('/').on('value', snap => {
    const data = snap.val() || {};
    queue = data.queue ? Object.values(data.queue).sort((a,b) => a.ts - b.ts) : [];
    totalDone = data.totalServed || 0;
    updateUI();
});

function updateUI() {
    const myId = localStorage.getItem('pb_user_id');
    const waiting = queue.filter(q => q.status === 'waiting');
    const readyItems = queue.filter(q => q.status === 'ready').sort((a,b) => b.calledAt - a.calledAt);
    const me = queue.find(q => q.id === myId);

    if(isAdmin) {
        document.getElementById('stat-waiting').innerText = waiting.length;
        document.getElementById('stat-ready').innerText = readyItems.length;
        document.getElementById('stat-done').innerText = totalDone;
        document.getElementById('staff-list').innerHTML = queue.map(q => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;">
                <span><b>#${q.number}</b> ${q.name}</span>
                <div style="display:flex; gap:5px;">
                    ${q.status === 'waiting' ? `<button style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:700;" onclick="callNextID('${q.id}')">CALL</button>` : 
                    `<button style="background:var(--accent); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:700;" onclick="finish('${q.id}')">DONE</button>
                     <button style="background:var(--missed); color:white; border:none; padding:8px 12px; border-radius:6px; font-weight:700;" onclick="markMissed('${q.id}')">MISS</button>`}
                </div>
            </div>
        `).join('');
    }

    if(me) {
        document.getElementById('reg-view').style.display = 'none';
        document.getElementById('status-view').style.display = 'block';
        document.getElementById('my-number').innerText = me.number;
        const fill = document.getElementById('journey-fill');
        const inst = document.getElementById('my-instruction');
        if(me.status === 'ready') {
            fill.style.width = "100%";
            [1,2,3].forEach(i => document.getElementById('node-'+i).classList.add('active'));
            inst.innerText = "YOUR PHOTO IS READY!";
            inst.style.background = "var(--accent)"; inst.style.color="white";
            if(alertsEnabled && !alertLoop) alertLoop = setInterval(() => navigator.vibrate([400,200,400]), 2000);
            if(alertsEnabled) document.getElementById('stop-alert').style.display = 'block';
        } else if (me.status === 'missed') {
            fill.style.width = "100%";
            inst.innerText = "MISSED! SEE STAFF MEMBER";
            inst.style.background = "var(--missed)"; inst.style.color="white";
        } else {
            const pos = waiting.findIndex(x => x.id === myId) + 1;
            fill.style.width = pos === 1 ? "66%" : "15%";
            inst.innerText = pos === 1 ? "YOU'RE UP NEXT!" : "QUEUE POSITION: " + pos;
        }
    } else {
        document.getElementById('reg-view').style.display = 'block';
        document.getElementById('status-view').style.display = 'none';
    }

    const top10 = readyItems.slice(0, 10);
    const missed = queue.filter(q => q.status === 'missed').slice(0, 15);
    document.getElementById('board-grid').innerHTML = top10.map(q => `<div class="ready-num">${q.number}</div>`).join('');
    document.getElementById('missed-grid').innerHTML = missed.map(q => `<span>#${q.number}</span>`).join('');
}

function joinQueue() {
    const name = document.getElementById('guest-name').value.trim();
    if(!name) return;
    db.ref('nextNum').transaction(c => (c || 1) + 1, (err, comm, snap) => {
        const id = 'G' + Date.now();
        db.ref('queue/'+id).set({id, name, number: snap.val()-1, status:'waiting', ts: Date.now()});
        localStorage.setItem('pb_user_id', id);
    });
}

function manualAdd() {
    const name = document.getElementById('manual-name').value.trim();
    if(!name) return;
    db.ref('nextNum').transaction(c => (c || 1) + 1, (err, comm, snap) => {
        const id = 'M' + Date.now();
        db.ref('queue/'+id).set({id, name, number: snap.val()-1, status:'waiting', ts: Date.now()});
        document.getElementById('manual-name').value = "";
    });
}

function callNext() {
    const next = queue.find(q => q.status === 'waiting');
    if(next) db.ref('queue/'+next.id).update({status: 'ready', calledAt: Date.now()});
}

function callNextID(id) { db.ref('queue/'+id).update({status: 'ready', calledAt: Date.now()}); }
function markMissed(id) { db.ref('queue/'+id).update({status: 'missed'}); }
function finish(id) { 
    db.ref('totalServed').transaction(c => (c || 0) + 1);
    db.ref('queue/'+id).remove(); 
}

function syncAlerts() { alertsEnabled = true; document.getElementById('alert-sync').innerText = "✅ ALERTS ACTIVE"; navigator.vibrate(100); }
function stopAlert() { clearInterval(alertLoop); alertLoop = null; document.getElementById('stop-alert').style.display = 'none'; }
function leaveQueue() {
    const id = localStorage.getItem('pb_user_id');
    if(id) db.ref('queue/'+id).remove();
    localStorage.clear();
    location.reload();
}

function resetSystem() {
    if(confirm("DANGER: This will delete ALL current entries and reset counter to 1.")) {
        db.ref('/').set({ nextNum: 1, totalServed: 0, queue: {} }).then(() => {
            localStorage.clear();
            location.reload();
        });
    }
}

function verifyPass() { if(btoa(document.getElementById('pass-input').value) === "b3BlbmhvdXNlMjAyNg==") { isAdmin=true; showScreen(pendingScreen); } }
let pendingScreen = '';
function tryAdmin(s) { pendingScreen = s; isAdmin ? showScreen(s) : showScreen('auth'); }
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    document.getElementById(id + '-screen').classList.add('active');
    if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
}
</script>
</body>
</html>
